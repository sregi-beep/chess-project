<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chess Project - Phase 2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #board { width: 400px; margin-bottom: 20px; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Chess Project - Web UI (Phase 2)</h1>
  <div id="board"></div>
  <button id="reset-btn">Reset Game</button>
  <div id="status"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script>
    var board = null;
    var game = new Chess();

    function onDragStart(source, piece, position, orientation) {
      if (game.game_over()) return false;
      if (piece.search(/^b/) !== -1) return false;
    }

    function onDrop(source, target) {
      var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      if (move === null) return 'snapback';

      fetch('/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ move: source + target })
      }).then(response => response.json()).then(data => {
        if (data.error) {
          alert(data.error);
          game.undo();
          board.position(game.fen());
          return;
        }

        board.position(data.fen);
        game.load(data.fen);

        if (data.game_over) {
          document.getElementById('status').innerText = 'Game over: ' + data.result;
          return;
        }

        window.setTimeout(engineMove, 250);
      });
    }

    function engineMove() {
      fetch('/engine-move', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            alert(data.error);
            return;
          }

          game.load(data.fen);
          board.position(data.fen);

          if (data.game_over) {
            document.getElementById('status').innerText = 'Game over: ' + data.result;
          }
        });
    }

    function onSnapEnd() {
      board.position(game.fen());
    }

    var config = {
      draggable: true,
      position: 'start',
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd
    };

    board = Chessboard('board', config);

    document.getElementById('reset-btn').addEventListener('click', function () {
      fetch('/reset', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
          game.load(data.fen);
          board.position(data.fen);
          document.getElementById('status').innerText = '';
        });
    });
  </script>
</body>
</html>
