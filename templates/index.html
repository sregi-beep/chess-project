<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Engine</title>

  <!-- jQuery MUST be first -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

  <!-- chess.js for client-side move validation -->
  <script src="https://cdn.jsdelivr.net/npm/chess.js@0.12.0/chess.min.js"></script>

  <!-- chessboard.js CSS and JS (after jQuery) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      margin: 0;
    }
    h1 { color: #e2b96f; margin-bottom: 4px; font-size: 1.8rem; }
    .subtitle { color: #aaa; margin-bottom: 20px; font-size: 0.95rem; }
    #board-wrap { width: 480px; max-width: 92vw; }
    #board { width: 100%; }
    .controls { margin-top: 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
    button {
      background: #e2b96f;
      border: none;
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      color: #1a1a2e;
    }
    button:hover { background: #c9a050; }
    .difficulty-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #2a2a4a;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .difficulty-wrap label { color: #aaa; font-weight: bold; }
    .difficulty-wrap select {
      background: #1a1a2e;
      color: #e2b96f;
      border: 1px solid #e2b96f;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    #depth-label {
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
    }
    #status {
      margin-top: 16px;
      font-size: 1.1rem;
      min-height: 26px;
      color: #e2b96f;
      font-weight: bold;
    }
    #thinking { color: #999; font-size: 0.9rem; min-height: 20px; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Chess Engine</h1>
  <p class="subtitle">You play as White &mdash; drag pieces to move.</p>
  <div id="board-wrap"><div id="board"></div></div>

  <div class="controls">
    <button id="btn-reset">New Game</button>
    <button id="btn-flip">Flip Board</button>
    <div class="difficulty-wrap">
      <label for="depth-select">Difficulty:</label>
      <select id="depth-select">
        <option value="1">1 &mdash; Beginner</option>
        <option value="2">2 &mdash; Easy</option>
        <option value="3" selected>3 &mdash; Medium</option>
        <option value="4">4 &mdash; Hard</option>
        <option value="5">5 &mdash; Expert</option>
      </select>
    </div>
  </div>
  <div id="depth-label">Depth 3 &mdash; looks 3 half-moves ahead</div>

  <div id="status"></div>
  <div id="thinking"></div>

  <script>
    var game = new Chess();
    var engineBusy = false;

    var depthDescriptions = {
      '1': 'Depth 1 \u2014 looks 1 half-move ahead',
      '2': 'Depth 2 \u2014 looks 2 half-moves ahead',
      '3': 'Depth 3 \u2014 looks 3 half-moves ahead',
      '4': 'Depth 4 \u2014 looks 4 half-moves ahead (slower)',
      '5': 'Depth 5 \u2014 looks 5 half-moves ahead (may take ~10s)'
    };

    var depthSelect = document.getElementById('depth-select');
    var depthLabel  = document.getElementById('depth-label');

    depthSelect.addEventListener('change', function() {
      depthLabel.textContent = depthDescriptions[depthSelect.value] || '';
    });

    function getDepth() { return parseInt(depthSelect.value, 10); }

    function setStatus(msg)   { document.getElementById('status').textContent = msg; }
    function setThinking(msg) { document.getElementById('thinking').textContent = msg; }

    function checkGameOver() {
      if (game.in_checkmate()) {
        setStatus(game.turn() === 'b' ? 'You win! Checkmate.' : 'Engine wins! Checkmate.');
      } else if (game.in_stalemate()) {
        setStatus('Stalemate \u2014 Draw!');
      } else if (game.in_threefold_repetition()) {
        setStatus('Draw by repetition!');
      } else if (game.insufficient_material()) {
        setStatus('Insufficient material \u2014 Draw!');
      } else if (game.in_check()) {
        setStatus(game.turn() === 'w' ? 'White is in check.' : 'Black is in check.');
      } else {
        setStatus('');
      }
    }

    function onDragStart(source, piece) {
      if (engineBusy) return false;
      if (game.game_over()) return false;
      if (piece.search(/^b/) !== -1) return false;
    }

    function onDrop(source, target) {
      var moveObj = game.move({ from: source, to: target, promotion: 'q' });
      if (moveObj === null) return 'snapback';
      board.position(game.fen());
      checkGameOver();
      if (!game.game_over()) {
        engineBusy = true;
        var d = getDepth();
        setThinking('Engine thinking (depth ' + d + ')...');
        setTimeout(askEngine, 150);
      }
    }

    function onSnapEnd() { board.position(game.fen()); }

    function askEngine() {
      fetch('/engine-move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fen: game.fen(), depth: getDepth() })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        engineBusy = false;
        setThinking('');
        if (data.error) { setStatus('Engine error: ' + data.error); return; }
        var from  = data.move.slice(0, 2);
        var to    = data.move.slice(2, 4);
        var promo = data.move.length > 4 ? data.move[4] : 'q';
        game.move({ from: from, to: to, promotion: promo });
        board.position(game.fen());
        checkGameOver();
      })
      .catch(function() {
        engineBusy = false;
        setThinking('');
        setStatus('Network error \u2014 is Flask running?');
      });
    }

    var board = Chessboard('board', {
      draggable: true,
      position: 'start',
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd,
      pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });

    document.getElementById('btn-reset').addEventListener('click', function() {
      fetch('/reset', { method: 'POST' })
        .then(function(res) { return res.json(); })
        .then(function() {
          game = new Chess();
          board.start();
          setStatus('');
          setThinking('');
          engineBusy = false;
        });
    });

    document.getElementById('btn-flip').addEventListener('click', function() {
      board.flip();
    });
  </script>
</body>
</html>
