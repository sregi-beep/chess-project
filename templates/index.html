<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Engine</title>
  <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      margin: 0;
    }
    h1 { color: #e2b96f; margin-bottom: 6px; font-size: 1.8rem; }
    p.subtitle { color: #aaa; margin-bottom: 20px; font-size: 0.95rem; }
    #board-container { width: 480px; max-width: 95vw; }
    #board { width: 100%; }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }
    button {
      background: #e2b96f;
      border: none;
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
      color: #1a1a2e;
    }
    button:hover { background: #c9a050; }
    #status {
      margin-top: 18px;
      font-size: 1.1rem;
      min-height: 28px;
      color: #e2b96f;
      font-weight: bold;
    }
    #thinking {
      color: #aaa;
      font-size: 0.9rem;
      min-height: 20px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Chess Engine</h1>
  <p class="subtitle">You play as White. Drag pieces to move.</p>
  <div id="board-container">
    <div id="board"></div>
  </div>
  <div class="controls">
    <button id="reset-btn">New Game</button>
    <button id="flip-btn">Flip Board</button>
  </div>
  <div id="status"></div>
  <div id="thinking"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/chess.js@0.12.0/chess.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script>
    var game = new Chess();
    var engineThinking = false;

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function setThinking(msg) {
      document.getElementById('thinking').textContent = msg;
    }

    function onDragStart(source, piece, position, orientation) {
      if (engineThinking) return false;
      if (game.game_over()) return false;
      if (piece.search(/^b/) !== -1) return false;
    }

    function onDrop(source, target) {
      var move = source + target;
      var moveObj = game.move({ from: source, to: target, promotion: 'q' });
      if (moveObj === null) return 'snapback';

      board.position(game.fen());
      checkGameOver();
      if (!game.game_over()) {
        engineThinking = true;
        setThinking('Engine thinking...');
        setTimeout(requestEngineMove, 100);
      }
    }

    function onSnapEnd() {
      board.position(game.fen());
    }

    function checkGameOver() {
      if (game.in_checkmate()) {
        setStatus(game.turn() === 'b' ? 'You win! Checkmate.' : 'Engine wins! Checkmate.');
      } else if (game.in_draw()) {
        setStatus('Draw!');
      } else if (game.in_check()) {
        setStatus(game.turn() === 'w' ? 'White is in check.' : 'Black is in check.');
      } else {
        setStatus('');
      }
    }

    function requestEngineMove() {
      var fen = game.fen();
      fetch('/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ move: null, fen: fen })
      })
      .then(function() {
        return fetch('/engine-move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fen: fen })
        });
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.error) {
          setThinking('Engine error: ' + data.error);
          engineThinking = false;
          return;
        }
        game.move({ from: data.move.slice(0,2), to: data.move.slice(2,4), promotion: 'q' });
        board.position(game.fen());
        engineThinking = false;
        setThinking('');
        checkGameOver();
      })
      .catch(function(err) {
        setThinking('Error: ' + err);
        engineThinking = false;
      });
    }

    var board = Chessboard('board', {
      draggable: true,
      position: 'start',
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd,
      pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png'
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
      fetch('/reset', { method: 'POST' })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          game = new Chess();
          board.start();
          setStatus('');
          setThinking('');
          engineThinking = false;
        });
    });

    document.getElementById('flip-btn').addEventListener('click', function() {
      board.flip();
    });
  </script>
</body>
</html>
